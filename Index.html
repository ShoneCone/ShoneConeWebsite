<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHONECONE</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e5e5;
      color: #111;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      border-bottom: 1px solid #bbb;
    }

    h1 {
      font-size: 42px;
      letter-spacing: 2px;
      margin: 0;
    }

    .sub {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }

    .container {
      margin-top: 40px;
    }

    /* COVER */
    .cover-container {
      position: relative;
      width: 260px;
      margin: 0 auto;
    }

    .cover {
      width: 100%;
      display: block;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .hover {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .cover-container:hover .hover {
      opacity: 1;
    }

    .cover-container:hover .main {
      opacity: 0;
    }

    .cover-container:hover .cover {
      transform: scale(1.03);
    }

    .title {
      margin-top: 15px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .countdown {
      margin-top: 10px;
      font-size: 18px;
      color: #b50000;
      letter-spacing: 2px;
    }

    .audio {
      margin-top: 25px;
    }

    audio {
      width: 260px;
    }

    .link {
      margin-top: 20px;
      display: inline-block;
      text-decoration: none;
      color: #111;
      border-bottom: 1px solid #111;
      font-size: 14px;
    }

    .link:hover {
      opacity: 0.6;
    }

  </style>
</head>

<body>

  <header>
    <h1>SHONECONE</h1>
    <div class="sub">(SPOTIFY ARTIST PROFILE LINK)</div>
  </header>

  <div class="container">

    <!-- COVER WITH HOVER -->
    <div class="cover-container">
      <img src="Scarecrow.png" class="cover main">
      <img src="Scarecrowtracklist.png" class="cover hover">
    </div>

    <div class="title">SCARECROW</div>

    <!-- COUNTDOWN -->
    <div class="countdown" id="countdown">Loading...</div>

    <!-- SNIPPET -->
    <div class="audio">
      <audio controls>
        <source src="snippet.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- PRE SAVE -->
    <a href="#" class="link">(SPOTIFY ALBUM LINK FOR PRE-SAVE)</a>

  </div>

  <script>
    const releaseDate = new Date("2026-05-01T00:00:00").getTime();
    const countdown = document.getElementById("countdown");

    setInterval(() => {
      const now = new Date().getTime();
      const distance = releaseDate - now;

      if (distance < 0) {
        countdown.innerHTML = "OUT NOW";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      countdown.innerHTML = `${days}D ${hours}H ${minutes}M ${seconds}S`;
    }, 1000);
  </script>

</body>
</html>
